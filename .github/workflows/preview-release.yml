name: Preview Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: preview-release
  cancel-in-progress: true

jobs:
  publish-preview:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundleArgs: --bundles nsis
          - platform: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundleArgs: --bundles nsis
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            bundleArgs: ""
          - platform: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bundleArgs: ""
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            bundleArgs: ""
          - platform: macos-15
            target: aarch64-apple-darwin
            bundleArgs: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install dependencies
        run: npm ci

      - name: Set preview version
        run: npm run release:set-preview -- ${{ github.run_number }}

      - name: Build and publish preview release
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: preview-v__VERSION__
          releaseName: Clawmark Preview v__VERSION__
          releaseBody: Automated preview release for __VERSION__.
          releaseDraft: false
          prerelease: true
          includeDebug: false
          includeRelease: true
          args: --target ${{ matrix.target }} ${{ matrix.bundleArgs }}

  publish-preview-android:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install dependencies
        run: npm ci

      - name: Set preview version
        run: npm run release:set-preview -- ${{ github.run_number }}

      - name: Read app version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build Android preview release
        run: npm run tauri -- android build --apk

      - name: Publish Android preview release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: preview-v${{ steps.version.outputs.value }}
          name: Clawmark Preview v${{ steps.version.outputs.value }}
          body: Automated preview release for ${{ steps.version.outputs.value }}.
          draft: false
          prerelease: true
          files: |
            src-tauri/gen/android/app/build/outputs/**/*.apk
            src-tauri/gen/android/app/build/outputs/**/*.aab
